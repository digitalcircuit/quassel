os:
  - linux
  - osx

# Ubuntu 14.04 LTS
dist: trusty

sudo: false
# Use the container-based architecture for faster builds, better caching, etc!
# For more guidance, including using custom Apt packages and sources/PPAs,
# see https://docs.travis-ci.com/user/migrating-from-legacy/

# Need a package or PPA not on the whitelist?  Submit a request:
# https://github.com/travis-ci/apt-package-whitelist
# https://github.com/travis-ci/apt-source-whitelist
addons:
  apt:
    packages:
    # Qt general and Webkit
    - libqt5webkit5-dev
    - qttools5-dev
    - qtscript5-dev
    # Qt development tools
    - qt4-dev-tools
    - qttools5-dev-tools
    # Qt cryptography
    - libqca2-dev
    # dbus
    - libdbusmenu-qt-dev
    - libdbusmenu-qt5-dev
    # Audio
    - libphonon-dev
    - libphonon4qt5-dev
    # Work around a bug in the libphonon CMake module
    # See https://bugs.debian.org/cgi-bin/bugreport.cgi?bug=805096
    - libphonon4qt5experimental4

language: cpp
cache: ccache

compiler:
  - gcc
  - clang

env:
  - QT_VERSION=qt4
  - QT_VERSION=qt5

matrix:
  exclude:
    - compiler: clang
      env: QT_VERSION=qt4
    - os: osx
      compiler: clang
    - os: osx
      env: QT_VERSION=qt4

install: |-
  if [ "$TRAVIS_OS_NAME" == "linux" ]
  then
    echo "Using packages from Travis apt addon"
  elif [ "$TRAVIS_OS_NAME" == "osx" ]
  then
    brew update
    brew install ninja qt5
  fi

script: |-
  mkdir build
  cd build
  if [ "$TRAVIS_OS_NAME" == "linux" ]
  then
    # Debugging!
    echo "getconf result:"
    getconf _NPROCESSORS_ONLN
    echo "nproc result:"
    nproc
    if [ "$QT_VERSION" = "qt4" ]; then cmake -DUSE_QT4=ON ..; fi
    if [ "$QT_VERSION" = "qt5" ]; then cmake ..; fi
    # nproc returns the number of processors.  Let's use all of them!
    # Travis' container infrastructure has 2 cores available.
    make -j $(nproc)
  elif [ "$TRAVIS_OS_NAME" == "osx" ]
  then
    if [[ "$TRAVIS_TAG" != "" && "$GH_TOKEN" != "" ]]
    then
      PATH=$PATH:/usr/local/opt/qt5/bin
      cmake -G"Ninja" .. -DCMAKE_BUILD_TYPE=Release -DWANT_CORE=ON -DWANT_QTCLIENT=ON -DWANT_MONO=ON -DDEPLOY=ON -DCMAKE_PREFIX_PATH=/usr/local/opt/qt5
    else
      cmake -G"Ninja" .. -DCMAKE_BUILD_TYPE=Release -DWANT_CORE=ON -DWANT_QTCLIENT=ON -DWANT_MONO=ON -DCMAKE_PREFIX_PATH=/usr/local/opt/qt5
    fi
    ninja install
  fi

deploy:
  provider: releases
  api_key: "${GH_TOKEN}"
  file_glob: true
  file:
    - "QuasselClient_MacOSX-x86_64_*.dmg"
    - "QuasselCore_MacOSX-x86_64_*.dmg"
    - "QuasselMono_MacOSX-x86_64_*.dmg"
  skip_cleanup: true
  on:
    tags: true
    condition: "$TRAVIS_OS_NAME == 'osx' && $GH_TOKEN != ''"
